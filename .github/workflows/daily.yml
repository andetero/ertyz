name: Daily Content Generation

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate content
        run: node generate.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit and push
        run: |
          git config user.name "ertyz-bot"
          git config user.email "bot@ertyz.com"
          git add content/daily.json content/archive/
          git commit -m "Daily update $(date +'%Y-%m-%d')" || echo "No changes"
          git push
